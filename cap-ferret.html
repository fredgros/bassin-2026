<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

.hotel-tri { border-top:7px solid #6749FF; }

<script>
const map = L.map('map',{zoomControl:false}).setView([44.68,-1.235],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OSM © CARTO', maxZoom:19, subdomains:'abcd'
}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);

// Marqueur stable au zoom :
// La hauteur totale du marqueur = lbl_h + tri(7) + dot(8) + gap(2) ≈ ~43px
// L'ancre (iconAnchor) = [moitie_largeur, hauteur_totale] => on ancre le bas du dot sur le point GPS
// Pour éviter de connaître la largeur exacte on utilise iconAnchor dynamique via CSS
function mk(label, type) {
  // On construit le HTML. L'ancre est réglée à [50% largeur, 43px depuis le haut].
  // Comme la largeur varie, on utilise une astuce : margin-left négatif de 50% via CSS.
  const html = `<div class="mk" style="position:relative;left:-50%">
    <div class="mk-lbl ${type}-lbl">${label}</div>
    <div class="mk-tri ${type}-tri"></div>
    <div class="mk-dot ${type}-dot"></div>
  </div>`;
  return L.divIcon({
    className: '',
    html: html,
    iconAnchor: [0, 43], // ancre verticale sur le bas du point
    iconSize: null
  });
}

function pop(title, sub, desc, tags, route) {
  const tg = tags.map(t=>`<span class="t t-${t.c}">${t.l}</span>`).join('');
  const rt = route ? `<div class="pp-route"><b>Itinéraire :</b> ${route}</div>` : '';
  return `<div class="pp-title">${title}</div><div class="pp-sub">${sub}</div><div class="pp-desc">${desc}</div><div class="pp-tags">${tg}</div>${rt}`;
}

const G = {hotel:L.layerGroup(), resto:L.layerGroup(), balade:L.layerGroup()};
const ST = {hotel:true, resto:true, balade:true};

// HÔTEL

  {ll:[44.6922,-1.2322],n:'Emile et Une Huitre',sub:"L'Herbe · #6 · 40 min vélo",

   desc:'Port pittoresque, terrasses bord du bassin, 5 cabanes ostréicoles. Le village le plus animé de la presqu\'île en juillet. Marché le matin. Combinable avec L\'Herbe (5 min vélo au nord).',
   tags:[{c:'nat',l:'Village ostréicole'},{c:'d',l:'11 km · 30 min'},{c:'cab',l:'5 cabanes'}],
   route:'Piste cyclable nord le long du bassin (D106), 11 km plats et ombragés. Entrer dans Le Canon par la route de la jetée.'},
  {ll:[44.7109,-1.2213],n:'Réservoirs de Piraillan',sub:'28 min vélo · 10 km · Gratuit',

  {ll:[44.7141,-1.2400],n:'Plage de Truc Vert',sub:'45 min vélo · 14 km · Plage sauvage',
   desc:'La plus belle plage océan de la presqu\'île. Dunes sauvages, forêt de pins jusqu\'à la mer. Très peu fréquentée comparée aux plages du village. Vélo autorisé sur sable mouillé du lever du soleil jusqu\'à 11h.',
   tags:[{c:'nat',l:'Plage sauvage'},{c:'velo',l:'Sable mouillé avant 11h'},{c:'d',l:'14 km · 45 min'}],
   route:'Piste nord jusqu\'à Piraillan (10 km), puis traversée forêt de pins vers l\'Océan (4 km). Bien balisé, ombragé.'},
  {ll:[44.6289,-1.2435],n:'Pointe du Cap — La Conche du Mimbeau',sub:'12 min vélo · 4 km aller',
   desc:'Pointe extrême de la presqu\'île. Vue sur la Dune du Pilat face à face. La conche du Mimbeau côté bassin, la grande plage Atlantique côté océan. Chez Hortense à 200m. L\'endroit le plus sauvage du Cap.',
   tags:[{c:'nat',l:'Bout de presqu\'île'},{c:'mer',l:'Vue Dune Pilat'},{c:'d',l:'4 km · 12 min'}],
   route:'Piste cyclable sud le long du bassin, 4 km plats depuis Villa Colette.'},
  {ll:[44.6521,-1.2437],n:'Tour du village à vélo',sub:'1h · 4 km · Balade d\'arrivée',
   desc:'Parfait pour le premier jour. Quartier ostréicole de la Douane, conche du Mimbeau, phare, plage Atlantique, port. Tour complet du village en 1h, terrain plat.',
   tags:[{c:'velo',l:'Circuit village'},{c:'d',l:'4 km · 1h'}],
   route:'Depuis Villa Colette → phare → quartier Douane/pêcheurs → conche du Mimbeau → plage Atlantique → retour. Boucle 4 km plate.'},
  {ll:[44.6563,-1.2369],n:'Traversée en navette — Arcachon',sub:'3 min vélo jusqu\'à la jetée · 7€ adulte',
   desc:'30 min de traversée en bateau depuis Bélisaire vers Arcachon. Vue panoramique sur le Bassin. Vélos acceptés (+5.50€). Toutes les heures 7h-23h. Incontournable pour la journée Arcachon.',
   tags:[{c:'mer',l:'Navette maritime'},{c:'d',l:'7€ adulte · +5.50€ vélo'}],

  {ll:[44.6917,-1.2333],n:'Randonnée Prés Salés d\'Arès',sub:'Depuis Arès · 12 km à pied · 3h30',

  {ll:[44.6565,-1.2394],n:'Vélo côté bassin — balade du matin',sub:'Balade libre · Durée au choix',
   desc:'Longer le bassin à vélo du matin, de la jetée Bélisaire vers le nord. Route plate, vues sur l\'eau et la Dune du Pilat, villages ostréicoles qui s\'enchaînent. Faire demi-tour quand on veut. La balade signature de la presqu\'île.',
   tags:[{c:'velo',l:'Balade libre'},{c:'nat',l:'Vue bassin continue'}],

].forEach(d=>L.marker(d.ll,{icon:mk(d.n,'balade'),zIndexOffset:500}).bindPopup(pop(d.n,d.sub,d.desc,d.tags,d.route||null)).addTo(G.balade));

Object.values(G).forEach(g=>g.addTo(map));
const pts=[];
Object.values(G).forEach(g=>g.eachLayer(l=>{if(l.getLatLng)pts.push(l.getLatLng())}));
if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.05));

function toggle(n){
  ST[n]=!ST[n];
  ST[n]?G[n].addTo(map):map.removeLayer(G[n]);
  document.getElementById('btn-'+n).classList.toggle('on',ST[n]);
}
</script>
